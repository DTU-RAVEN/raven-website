<line x1="140" y1="188" x2="226" y2="187" stroke="#161a20" stroke-width="1" opacity=".35"/>

<rect x="230" y="193" width="12" height="7" rx="1" fill="#161a20"/>
<circle cx="236" cy="206" r="8.5" fill="#ffffff" stroke="#161a20" stroke-width="2"/>
<circle class="pn d" cx="236" cy="206" r="3.5" fill="#b0182b"/>
</svg>
