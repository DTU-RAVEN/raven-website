<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<title>Autonomous drone perceiving and avoiding an obstacle</title>
<desc>A side-view drone points a focused perception cone at an obstacle ahead, detects it, and plans a path up and over it to a target.</desc>
<style>
  .lbl { font-family:"Space Mono", ui-monospace, monospace; }
  @keyframes raven-pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.3); opacity:.55; } }
  @keyframes raven-flow { to { stroke-dashoffset:-18; } }
  .pn { transform-box: fill-box; transform-origin: center; }
  @media (prefers-reduced-motion: no-preference) {
    .pn { animation: raven-pulse 2s ease-in-out infinite; }
    .pn.d { animation-delay: .6s; }
    .path { animation: raven-flow 1.4s linear infinite; }
  }
</style>

<defs>
  <linearGradient id="coneGradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0e7c8b" stop-opacity="0.30" />
    <stop offset="75%" stop-color="#0e7c8b" stop-opacity="0.12" />
    <stop offset="100%" stop-color="#0e7c8b" stop-opacity="0.00" />
  </linearGradient>
</defs>

<rect x="0" y="0" width="680" height="420" fill="#ffffff"/>

<path d="M16 34 L16 16 L34 16" fill="none" stroke="#b0182b" stroke-width="2"/>
<path d="M646 16 L664 16 L664 34" fill="none" stroke="#b0182b" stroke-width="2"/>
<path d="M16 386 L16 404 L34 404" fill="none" stroke="#b0182b" stroke-width="2"/>
<path d="M646 404 L664 404 L664 386" fill="none" stroke="#b0182b" stroke-width="2"/>

<text class="lbl" x="26" y="33" font-size="11" letter-spacing="1.6" fill="#565e6b">FORWARD VISION</text>
<circle class="pn d" cx="560" cy="29" r="4" fill="#b0182b"/>
<text class="lbl" x="572" y="33" font-size="11" letter-spacing="1.6" fill="#161a20">TRACKING</text>

<line x1="40" y1="348" x2="640" y2="348" stroke="#d8dce1" stroke-width="1" stroke-dasharray="3 7"/>

<path d="M 236 206 L 515 215 A 281 281 0 0 1 475 355 Z" fill="url(#coneGradient)" />
<line x1="236" y1="206" x2="515" y2="215" stroke="#0e7c8b" stroke-width="1" opacity="0.25"/>
<line x1="236" y1="206" x2="475" y2="355" stroke="#0e7c8b" stroke-width="1" opacity="0.25"/>

<rect x="434" y="238" width="40" height="110" fill="#161a20" opacity=".12"/>
<rect x="434" y="238" width="40" height="110" fill="none" stroke="#161a20" stroke-width=".5" opacity=".3"/>
<line x1="434" y1="270" x2="474" y2="270" stroke="#161a20" stroke-width=".5" opacity=".2"/>
<line x1="434" y1="305" x2="474" y2="305" stroke="#161a20" stroke-width=".5" opacity=".2"/>

<g stroke="#b0182b" stroke-width="2.5" fill="none" stroke-linecap="round">
  <path d="M424 241 L424 228 L437 228"/>
  <path d="M471 228 L484 228 L484 241"/>
  <path d="M424 343 L424 356 L437 356"/>
  <path d="M471 356 L484 356 L484 343"/>
</g>
<rect x="424" y="212" width="84" height="15" fill="#b0182b"/>
<text class="lbl" x="430" y="223" font-size="9" letter-spacing="0.4" fill="#ffffff">OBSTACLE 0.93</text>

