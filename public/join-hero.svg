</g>

<line x1="152" y1="172" x2="122" y2="138" stroke="#161a20" stroke-width="4" stroke-linecap="round"/>
<line x1="204" y1="172" x2="222" y2="138" stroke="#161a20" stroke-width="4" stroke-linecap="round"/>
