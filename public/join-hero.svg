<path d="M126 183 C124 173 134 168 150 168 L208 169 C236 170 252 178 252 184 C252 190 236 193 208 194 L150 197 C134 197 128 192 126 183 Z" fill="#ffffff" stroke="#161a20" stroke-width="2.5"/>
